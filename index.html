<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pergunta importante</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f4f0;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .card {
    max-width: 420px;
    width: 90%;
    background: #fff;
    border: 1px solid #e0dfd8;
    border-radius: 16px;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
  }
  .emoji { font-size: 52px; margin-bottom: 1rem; }
  h2 { font-size: 22px; font-weight: 500; color: #1a1a1a; margin-bottom: 0.5rem; }
  p { font-size: 15px; color: #666; line-height: 1.7; margin-bottom: 1.5rem; }
  .btn {
    display: inline-block;
    padding: 11px 30px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fff;
    font-size: 15px;
    cursor: pointer;
    margin: 4px;
    transition: background 0.15s;
  }
  .btn:hover { background: #f5f4f0; }
  .btn-no {
    color: #888;
    position: static;
  }
  .btn-no.fugindo {
    position: fixed;
  }
  .confirmed { display: none; }
  .confirmed.show { display: block; }
  .confirmed p { color: #2a7a4b; font-size: 16px; margin: 0; }
  .actions.hide { display: none; }
</style>
</head>

<div class="card">
  <div class="emoji">🫵</div>
  <h2>Tenho uma pergunta séria.</h2>
  <p>Esse final de semana eu preciso de alguém com bom gosto, bom humor e seja uma boa companhia.<br><br>Você se encaixa nos três. Bora?</p>

  <div class="actions" id="actions">
    <button class="btn" onclick="aceitar()">Claro, tô dentro 😄</button>
    <button class="btn btn-no" id="btnNo" onclick="tentarRecusar()">Não posso...</button>
  </div>

<script>
  const btnNo = document.getElementById('btnNo');
  let attempts = 0;
  const respostas = [
    'Tem certeza? 🤨',
    'Pensa melhor...',
    'Isso não tá certo',
    'Última chance 👀',
    'Tá bom, desisto... 😔'
  ];

  function tentarRecusar() {
    btnNo.classList.add('fugindo');
    const margin = 20;
    const btnW = btnNo.offsetWidth;
    const btnH = btnNo.offsetHeight;
    const maxX = window.innerWidth - btnW - margin;
    const maxY = window.innerHeight - btnH - margin;
    const x = Math.floor(Math.random() * (maxX - margin)) + margin;
    const y = Math.floor(Math.random() * (maxY - margin)) + margin;
    btnNo.style.left = x + 'px';
    btnNo.style.top = y + 'px';
    if (attempts < respostas.length) {
      btnNo.textContent = respostas[attempts];
    }
    attempts++;
  }

  function aceitar() {
    document.getElementById('actions').classList.add('hide');
    document.getElementById('confirmed').classList.add('show');
    btnNo.style.display = 'none';
  }
</script>
